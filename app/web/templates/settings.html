{% extends "base.html" %}
{% set active_page = "settings" %}

{% block title %}Settings — ProtocolMapper{% endblock %}
{% block heading %}Network Settings{% endblock %}

{% block content %}
<div x-data="settingsApp()" x-init="load()" class="max-w-lg">

  <div class="bg-white rounded-xl shadow p-6 space-y-5">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">UDP Listen IP</label>
      <input x-model="form.listen_ip" class="input" placeholder="0.0.0.0" />
      <p class="text-xs text-gray-400 mt-1">Use 0.0.0.0 to listen on all interfaces.</p>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">UDP Listen Port</label>
      <input x-model.number="form.listen_port" type="number" min="1" max="65535"
             class="input" placeholder="5005" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Max Log Entries (in memory)</label>
      <input x-model.number="form.log_max_entries" type="number" min="10" max="100000"
             class="input" placeholder="1000" />
    </div>

    <div class="flex items-center gap-3 pt-2">
      <button @click="save()"
              class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm transition">
        Save &amp; Apply
      </button>
      <span x-show="saved" x-cloak class="text-green-600 text-sm">✓ Saved! UDP server restarted if port changed.</span>
      <span x-show="error" x-cloak class="text-red-500 text-sm" x-text="error"></span>
    </div>

  </div>

</div>

<style>
.input {
  @apply w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400;
}
</style>

<script>
function settingsApp() {
  return {
    form: { listen_ip: '', listen_port: 5005, log_max_entries: 1000 },
    saved: false,
    error: '',

    async load() {
      const r = await fetch('/api/settings/');
      this.form = await r.json();
    },

    async save() {
      this.saved = false;
      this.error = '';
      const r = await fetch('/api/settings/', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(this.form)
      });
      if (r.ok) {
        this.form = await r.json();
        this.saved = true;
        setTimeout(() => this.saved = false, 4000);
      } else {
        const d = await r.json();
        this.error = JSON.stringify(d.detail);
      }
    }
  };
}
</script>
{% endblock %}
